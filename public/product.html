<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="pageTitle">商品详情 - AI 代充平台</title>
  <meta name="description" content="AI 订阅代充商品详情，官方原价直充，2 分钟自动到账。" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .detail-wrap { max-width: 980px; margin: 0 auto; padding: 28px 20px; }
    .breadcrumb { font-size: 13px; color: var(--muted); margin-bottom: 18px; }
    .breadcrumb a { color: var(--muted); }
    .detail-grid { display: grid; grid-template-columns: 360px 1fr; gap: 32px; }
    .detail-media { background: linear-gradient(135deg, var(--primary-light), #d4f0e8); border-radius: 16px; height: 300px; display: flex; align-items: center; justify-content: center; font-size: 96px; box-shadow: var(--shadow); }
    .detail-media img { width: 100%; height: 100%; object-fit: cover; border-radius: 16px; }
    .detail-tag { display: inline-block; font-size: 13px; color: var(--primary); background: var(--primary-light); padding: 3px 10px; border-radius: 6px; margin-bottom: 12px; }
    .detail-name { font-size: 26px; font-weight: 800; margin-bottom: 12px; }
    .detail-price { display: flex; align-items: baseline; gap: 12px; background: #fff7f5; border: 1px solid #ffe0d8; padding: 16px 20px; border-radius: 12px; margin-bottom: 18px; }
    .detail-price .pn { color: var(--danger); font-size: 34px; font-weight: 800; }
    .detail-price .po { color: var(--muted); text-decoration: line-through; }
    .detail-feats { list-style: none; padding: 0; margin: 0 0 18px; }
    .detail-feats li { padding: 7px 0 7px 26px; position: relative; font-size: 14.5px; border-bottom: 1px dashed var(--border); }
    .detail-feats li::before { content: '✓'; position: absolute; left: 4px; color: var(--primary); font-weight: 800; }
    .meta-row { display: flex; gap: 20px; font-size: 13px; color: var(--muted); margin-bottom: 22px; flex-wrap: wrap; }
    .meta-row b { color: var(--text); }
    .buy-actions { display: flex; gap: 12px; }
    .desc-block { margin-top: 34px; }
    .desc-block h3 { font-size: 18px; margin-bottom: 12px; padding-left: 10px; border-left: 4px solid var(--primary); }
    .desc-block p { color: #374151; line-height: 1.9; }
    @media (max-width: 760px) { .detail-grid { grid-template-columns: 1fr; } .detail-media { height: 220px; font-size: 72px; } }
  </style>
</head>
<body>
  <header class="navbar" id="navbar"></header>

  <div class="detail-wrap">
    <div class="breadcrumb"><a href="/">首页</a> / <a href="/#catalog">全部商品</a> / <span id="bcName">商品详情</span></div>
    <div id="detailRoot"><div class="empty">加载中...</div></div>
  </div>

  <!-- 下单弹窗（与首页一致） -->
  <div class="modal-mask" id="orderModal">
    <div class="modal">
      <div class="modal-header"><h3>确认下单</h3><button class="close-x" onclick="closeOrder()">&times;</button></div>
      <div class="modal-body">
        <div id="orderProductInfo" class="card mb" style="box-shadow:none;border:1px solid var(--border)"></div>
        <div class="alert alert-error" id="orderErr" style="display:none"></div>
        <div class="form-group"><label>购买数量</label><input type="number" class="form-control" id="qty" value="1" min="1" max="99" /></div>
        <div class="form-group" id="acctGroup">
          <label>账号 <span class="muted">(代充至此账号)</span></label>
          <input type="text" class="form-control" id="cgEmail" placeholder="您的登录邮箱/账号" />
        </div>
        <div class="form-group" id="pwdGroup">
          <label>账号密码 <span class="muted">(选填)</span></label>
          <input type="text" class="form-control" id="cgPwd" placeholder="如需代登录请填写，否则留空" />
          <div class="form-hint">⚠️ 卡密类商品无需填写账号密码。</div>
        </div>
        <div class="form-group">
          <label>联系方式 <span class="muted">(微信/QQ/邮箱)</span></label>
          <input type="text" class="form-control" id="contact" placeholder="便于客服与您联系" />
        </div>
        <div class="form-group"><label>备注 <span class="muted">(选填)</span></label><textarea class="form-control" id="remark"></textarea></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeOrder()">取消</button>
        <button class="btn" id="submitOrderBtn" onclick="submitOrder()">提交订单并去支付</button>
      </div>
    </div>
  </div>

  <script src="/js/common.js"></script>
  <script>
    let currentUser = null;
    let product = null;

    function getId() { return Number(new URLSearchParams(location.search).get('id')); }

    async function init() {
      currentUser = await renderNavbar('home');
      const id = getId();
      const root = document.getElementById('detailRoot');
      if (!id) { root.innerHTML = '<div class="empty">缺少商品参数</div>'; return; }
      try {
        product = (await API.get('/api/products/' + id)).product;
        render();
      } catch (e) {
        root.innerHTML = `<div class="empty">商品不存在或已下架<br><a href="/">返回首页</a></div>`;
      }
    }

    function render() {
      const p = product;
      const brand = BRAND_MAP[p.brand] || { text: p.brand || '', icon: '📦' };
      const cat = CATEGORY_MAP[p.category] || { text: p.category, icon: '📦' };
      const dlv = DELIVERY_MAP[p.deliveryType];
      const free = Number(p.price) === 0;
      document.getElementById('pageTitle').textContent = `${p.name} - AI 代充平台`;
      document.getElementById('bcName').textContent = p.name;
      const feats = (p.features || []).map(f => `<li>${escapeHtml(f)}</li>`).join('');
      const media = p.image ? `<img src="${p.image}" alt="">` : brand.icon;
      document.getElementById('detailRoot').innerHTML = `
        <div class="detail-grid">
          <div class="detail-media">${media}</div>
          <div>
            <span class="detail-tag">${brand.icon} ${brand.text} · ${cat.text}</span>
            ${p.badge ? `<span class="detail-tag" style="background:#fff0e8;color:#ea580c">${escapeHtml(p.badge)}</span>` : ''}
            <div class="detail-name">${escapeHtml(p.name)}</div>
            <div class="detail-price">
              ${free ? `<span class="pn">免费</span>` :
                `<span class="pn"><small style="font-size:18px">¥</small>${Number(p.price).toFixed(0)}</span>
                 ${p.originalPrice > p.price ? `<span class="po">¥${Number(p.originalPrice).toFixed(0)}</span>` : ''}`}
              ${dlv ? `<span class="delivery-chip" style="font-size:13px">${dlv.icon}${dlv.text}</span>` : ''}
            </div>
            ${feats ? `<ul class="detail-feats">${feats}</ul>` : ''}
            <div class="meta-row">
              <span>已售 <b>${p.sales || 0}</b></span>
              <span>库存 <b>${p.stock}</b></span>
              ${p.durationDays ? `<span>有效期 <b>${p.durationDays} 天</b></span>` : ''}
              <span>交付 <b>${dlv ? dlv.text : '人工'}</b></span>
            </div>
            <div class="buy-actions">
              <button class="btn" style="padding:13px 32px;font-size:16px" onclick="openOrder()">${free ? '免费领取' : '立即购买'}</button>
              <a class="btn btn-outline" style="padding:13px 24px" href="/#catalog">返回商品列表</a>
            </div>
          </div>
        </div>
        <div class="desc-block">
          <h3>商品说明</h3>
          <p>${escapeHtml(p.description || '暂无更多说明。')}</p>
        </div>
        <div class="desc-block">
          <h3>购买流程</h3>
          <p>1️⃣ 点击「立即购买」并填写信息下单 → 2️⃣ 完成支付 → 3️⃣ ${p.deliveryType === 'card' ? '系统自动发放卡密，订单页即可查看，秒到账' : '客服为您代充，2 分钟内到账'}。<br>全程支持 30 天质保，不成功全额退款。</p>
        </div>`;
    }

    function openOrder() {
      if (!currentUser) { location.href = '/login.html?next=' + encodeURIComponent(location.pathname + location.search); return; }
      const p = product;
      const needAcct = p.needAccount !== undefined ? p.needAccount : (p.category === 'plus' || p.category === 'team');
      document.getElementById('acctGroup').style.display = needAcct ? '' : 'none';
      document.getElementById('pwdGroup').style.display = needAcct ? '' : 'none';
      const dlv = DELIVERY_MAP[p.deliveryType];
      document.getElementById('orderProductInfo').innerHTML =
        `<div class="product-name">${escapeHtml(p.name)}</div>
         <div class="product-price"><span class="price-now"><small>¥</small>${Number(p.price).toFixed(0)}</span>
           ${dlv ? `<span class="delivery-chip">${dlv.icon}${dlv.text}</span>` : ''}</div>`;
      document.getElementById('qty').value = 1;
      document.getElementById('orderErr').style.display = 'none';
      document.getElementById('orderModal').classList.add('show');
    }
    function closeOrder() { document.getElementById('orderModal').classList.remove('show'); }

    async function submitOrder() {
      const btn = document.getElementById('submitOrderBtn');
      const err = document.getElementById('orderErr');
      err.style.display = 'none';
      const payload = {
        productId: product.id,
        quantity: parseInt(document.getElementById('qty').value, 10) || 1,
        chatgptEmail: document.getElementById('cgEmail').value.trim(),
        chatgptPassword: document.getElementById('cgPwd').value.trim(),
        contact: document.getElementById('contact').value.trim(),
        remark: document.getElementById('remark').value.trim(),
      };
      btn.disabled = true; btn.textContent = '提交中...';
      try {
        const { order } = await API.post('/api/orders', payload);
        location.href = `/orders.html?pay=${order.id}`;
      } catch (e) {
        err.textContent = e.message; err.style.display = 'block';
        btn.disabled = false; btn.textContent = '提交订单并去支付';
      }
    }

    init();
  </script>
</body>
</html>
