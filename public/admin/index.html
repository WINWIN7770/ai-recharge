<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>数据看板 - 管理后台</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="adminLayout">
    <div class="stat-grid" id="statGrid"><div class="empty">加载中...</div></div>

    <div id="alertBox"></div>

    <div class="row" style="gap:18px;align-items:stretch;margin-bottom:18px">
      <div class="card" style="flex:2;min-width:320px">
        <h3 class="mb">近 14 天营收趋势</h3>
        <div id="revChart"><div class="empty">加载中...</div></div>
      </div>
      <div class="card" style="flex:1;min-width:240px">
        <h3 class="mb">订单状态分布</h3>
        <div id="funnel"></div>
      </div>
    </div>

    <div class="card">
      <h3 class="mb">最近订单</h3>
      <div class="table-wrap">
        <table>
          <thead><tr><th>订单号</th><th>商品</th><th>用户</th><th>金额</th><th>状态</th><th>时间</th></tr></thead>
          <tbody id="recentOrders"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="/js/common.js"></script>
  <script src="/admin/admin-common.js"></script>
  <script>
    async function init() {
      const me = await initAdmin('dashboard');
      if (!me) return;
      try {
        const { stats } = await API.get('/api/admin/stats');
        const cards = [
          { num: stats.totalOrders, label: '总订单数' },
          { num: stats.paidPending, label: '待处理(已付款)' },
          { num: stats.pendingOrders, label: '待支付' },
          { num: stats.completedOrders, label: '已完成' },
          { num: money(stats.revenue), label: '总营收' },
          { num: stats.totalUsers, label: '用户数' },
          { num: stats.totalProducts, label: '商品数' },
          { num: stats.todayOrders, label: '今日订单' },
        ];
        document.getElementById('statGrid').innerHTML = cards.map(c =>
          `<div class="stat-card"><div class="num">${c.num}</div><div class="label">${c.label}</div></div>`).join('');
      } catch (e) { toast(e.message, 'err'); }

      try {
        const { orders } = await API.get('/api/admin/orders');
        const recent = orders.slice(0, 8);
        document.getElementById('recentOrders').innerHTML = recent.length ? recent.map(o =>
          `<tr><td>${o.orderNo}</td><td>${escapeHtml(o.productName)}</td><td>${escapeHtml(o.username)}</td>
           <td>${money(o.amount)}</td><td>${statusBadge(o.status)}</td><td>${fmtDate(o.createdAt)}</td></tr>`).join('')
          : '<tr><td colspan="6" class="empty">暂无订单</td></tr>';
      } catch (e) { toast(e.message, 'err'); }

      // 数据分析图表
      try {
        const a = await API.get('/api/admin/analytics');
        renderRevChart(a.daily);
        renderFunnel(a.funnel);
        renderAlerts(a.lowStock);
      } catch (e) { /* 忽略图表错误 */ }
    }

    function renderRevChart(daily) {
      const max = Math.max(1, ...daily.map(d => d.revenue));
      const W = 100, gap = 100 / daily.length;
      const bars = daily.map((d, i) => {
        const h = (d.revenue / max) * 90;
        const x = i * gap + gap * 0.15, bw = gap * 0.7;
        return `<rect x="${x}" y="${100 - h}" width="${bw}" height="${h}" rx="0.6" fill="var(--primary)">
          <title>${d.date}：¥${d.revenue}（${d.orders}单）</title></rect>`;
      }).join('');
      const labels = daily.map((d, i) =>
        (i % 2 === 0) ? `<span style="flex:1;text-align:center">${d.date.slice(5)}</span>` : `<span style="flex:1"></span>`).join('');
      document.getElementById('revChart').innerHTML = `
        <svg viewBox="0 0 100 100" preserveAspectRatio="none" style="width:100%;height:180px;background:#fafbfc;border-radius:8px">${bars}</svg>
        <div style="display:flex;font-size:11px;color:var(--muted);margin-top:4px">${labels}</div>
        <div class="form-hint text-center mt">峰值 ¥${max}</div>`;
    }

    function renderFunnel(funnel) {
      const order = [['pending','待支付'],['paid','已付款'],['processing','处理中'],['completed','已完成'],['cancelled','已取消'],['refunded','已退款']];
      const total = Object.values(funnel).reduce((a,b)=>a+b,0) || 1;
      document.getElementById('funnel').innerHTML = order.filter(([k])=>funnel[k]).map(([k,label]) => {
        const v = funnel[k] || 0, pct = Math.round(v/total*100);
        return `<div style="margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;font-size:13px"><span>${label}</span><span>${v}（${pct}%）</span></div>
          <div style="height:8px;background:#eee;border-radius:6px;overflow:hidden"><div style="height:100%;width:${pct}%;background:var(--primary)"></div></div>
        </div>`;
      }).join('') || '<div class="empty">暂无数据</div>';
    }

    function renderAlerts(lowStock) {
      if (!lowStock || !lowStock.length) { document.getElementById('alertBox').innerHTML = ''; return; }
      document.getElementById('alertBox').innerHTML =
        `<div class="alert alert-error mb">⚠️ 卡密库存预警：${lowStock.map(s => `${escapeHtml(s.name)}（剩 ${s.available}）`).join('、')} —— 请尽快到「卡密管理」补货。</div>`;
    }
    init();
  </script>
</body>
</html>
