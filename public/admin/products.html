<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>商品管理 - 管理后台</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="adminLayout">
    <div class="page-head">
      <h2>商品管理</h2>
      <button class="btn" onclick="openEdit()">+ 新增商品</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>ID</th><th>商品名称</th><th>分类</th><th>售价</th><th>原价</th><th>库存</th><th>销量</th><th>状态</th><th>操作</th></tr></thead>
        <tbody id="rows"><tr><td colspan="9" class="empty">加载中...</td></tr></tbody>
      </table>
    </div>
  </div>

  <div class="modal-mask" id="editModal">
    <div class="modal">
      <div class="modal-header"><h3 id="editTitle">新增商品</h3><button class="close-x" onclick="closeEdit()">&times;</button></div>
      <div class="modal-body">
        <div class="alert alert-error" id="editErr" style="display:none"></div>
        <input type="hidden" id="pid" />
        <div class="form-group"><label>商品名称 *</label><input class="form-control" id="f_name" /></div>
        <div class="row">
          <div class="form-group" style="flex:1"><label>品牌</label>
            <select class="form-control" id="f_brand">
              <option value="gpt">ChatGPT</option>
              <option value="claude">Claude</option>
              <option value="gemini">Gemini</option>
              <option value="grok">Grok</option>
              <option value="suno">Suno</option>
              <option value="apple">Apple ID</option>
            </select>
          </div>
          <div class="form-group" style="flex:1"><label>分类</label>
            <select class="form-control" id="f_category">
              <option value="plus">Plus 会员</option>
              <option value="pro">Pro 专业版</option>
              <option value="max">Max 旗舰版</option>
              <option value="team">Team 团队版</option>
              <option value="advanced">Advanced</option>
              <option value="api">API 额度</option>
              <option value="gift">礼品卡</option>
              <option value="id">Apple ID</option>
              <option value="other">其他</option>
            </select>
          </div>
        </div>
        <div class="row">
          <div class="form-group" style="flex:1"><label>交付方式</label>
            <select class="form-control" id="f_deliveryType">
              <option value="manual">人工代充</option>
              <option value="link">专属升级链接</option>
              <option value="card">卡密秒发（付款后自动发货）</option>
            </select>
          </div>
          <div class="form-group" style="flex:1"><label>角标（如 🔥热销，可空）</label><input class="form-control" id="f_badge" /></div>
        </div>
        <div class="form-group"><label>描述</label><textarea class="form-control" id="f_description"></textarea></div>
        <div class="row">
          <div class="form-group" style="flex:1"><label>售价 (元) *</label><input type="number" step="0.01" class="form-control" id="f_price" /></div>
          <div class="form-group" style="flex:1"><label>原价 (元)</label><input type="number" step="0.01" class="form-control" id="f_originalPrice" /></div>
        </div>
        <div class="row">
          <div class="form-group" style="flex:1"><label>有效天数</label><input type="number" class="form-control" id="f_durationDays" value="0" /></div>
          <div class="form-group" style="flex:1"><label>库存</label><input type="number" class="form-control" id="f_stock" value="999" /></div>
        </div>
        <div class="form-group">
          <label>商品图片 (选填)</label>
          <input type="file" class="form-control" id="f_image" accept="image/*" onchange="uploadImg(this)" />
          <div class="form-hint" id="imgHint"></div>
        </div>
        <div class="form-group">
          <label><input type="checkbox" id="f_active" checked /> 上架销售</label>
          &nbsp;&nbsp;
          <label><input type="checkbox" id="f_needAccount" /> 下单需填买家账号（人工代充类勾选；卡密类不勾）</label>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeEdit()">取消</button>
        <button class="btn" id="saveBtn" onclick="save()">保存</button>
      </div>
    </div>
  </div>

  <script src="/js/common.js"></script>
  <script src="/admin/admin-common.js"></script>
  <script>
    let products = [];
    let uploadedImage = '';

    async function init() {
      const me = await initAdmin('products');
      if (!me) return;
      await load();
    }
    async function load() {
      const { products: list } = await API.get('/api/admin/products');
      products = list;
      document.getElementById('rows').innerHTML = list.length ? list.map(p => {
        const cat = CATEGORY_MAP[p.category] || { text: p.category };
        const dlv = (typeof DELIVERY_MAP !== 'undefined' && DELIVERY_MAP[p.deliveryType]) || null;
        return `<tr>
          <td>${p.id}</td><td>${escapeHtml(p.name)}${dlv ? ` <span class="delivery-chip">${dlv.icon}${dlv.text}</span>` : ''}</td><td>${cat.text}</td>
          <td>${money(p.price)}</td><td>${money(p.originalPrice)}</td><td>${p.stock}</td><td>${p.sales || 0}</td>
          <td>${p.active ? '<span class="badge badge-completed">上架</span>' : '<span class="badge badge-cancelled">下架</span>'}</td>
          <td>
            <button class="btn btn-sm btn-outline" onclick="openEdit(${p.id})">编辑</button>
            <button class="btn btn-sm btn-danger" onclick="del(${p.id})">删除</button>
          </td></tr>`;
      }).join('') : '<tr><td colspan="9" class="empty">暂无商品</td></tr>';
    }

    function openEdit(id) {
      uploadedImage = '';
      document.getElementById('editErr').style.display = 'none';
      document.getElementById('imgHint').textContent = '';
      const p = id ? products.find(x => x.id === id) : null;
      document.getElementById('editTitle').textContent = p ? '编辑商品' : '新增商品';
      document.getElementById('pid').value = p ? p.id : '';
      document.getElementById('f_name').value = p ? p.name : '';
      document.getElementById('f_brand').value = p ? (p.brand || 'gpt') : 'gpt';
      document.getElementById('f_category').value = p ? p.category : 'plus';
      document.getElementById('f_deliveryType').value = p ? (p.deliveryType || 'manual') : 'manual';
      document.getElementById('f_badge').value = p ? (p.badge || '') : '';
      document.getElementById('f_needAccount').checked = p ? !!p.needAccount : true;
      document.getElementById('f_description').value = p ? p.description : '';
      document.getElementById('f_price').value = p ? p.price : '';
      document.getElementById('f_originalPrice').value = p ? p.originalPrice : '';
      document.getElementById('f_durationDays').value = p ? p.durationDays : 0;
      document.getElementById('f_stock').value = p ? p.stock : 999;
      document.getElementById('f_active').checked = p ? p.active : true;
      if (p && p.image) { uploadedImage = p.image; document.getElementById('imgHint').innerHTML = `已有图片 <a href="${p.image}" target="_blank">查看</a>`; }
      document.getElementById('editModal').classList.add('show');
    }
    function closeEdit() { document.getElementById('editModal').classList.remove('show'); }

    async function uploadImg(input) {
      const f = input.files[0]; if (!f) return;
      const fd = new FormData(); fd.append('file', f);
      try {
        const { url } = await API.post('/api/admin/upload', fd, true);
        uploadedImage = url;
        document.getElementById('imgHint').innerHTML = `上传成功 <a href="${url}" target="_blank">查看</a>`;
      } catch (e) { toast(e.message, 'err'); }
    }

    async function save() {
      const err = document.getElementById('editErr');
      const btn = document.getElementById('saveBtn');
      err.style.display = 'none';
      const id = document.getElementById('pid').value;
      const body = {
        name: document.getElementById('f_name').value.trim(),
        brand: document.getElementById('f_brand').value,
        category: document.getElementById('f_category').value,
        deliveryType: document.getElementById('f_deliveryType').value,
        badge: document.getElementById('f_badge').value.trim(),
        needAccount: document.getElementById('f_needAccount').checked,
        description: document.getElementById('f_description').value.trim(),
        price: document.getElementById('f_price').value,
        originalPrice: document.getElementById('f_originalPrice').value || document.getElementById('f_price').value,
        durationDays: document.getElementById('f_durationDays').value,
        stock: document.getElementById('f_stock').value,
        active: document.getElementById('f_active').checked,
        image: uploadedImage,
      };
      if (!body.name || body.price === '') { err.textContent = '名称和价格必填'; err.style.display = 'block'; return; }
      btn.disabled = true; btn.textContent = '保存中...';
      try {
        if (id) await API.put('/api/admin/products/' + id, body);
        else await API.post('/api/admin/products', body);
        toast('已保存', 'ok'); closeEdit(); load();
      } catch (e) { err.textContent = e.message; err.style.display = 'block'; }
      finally { btn.disabled = false; btn.textContent = '保存'; }
    }

    async function del(id) {
      if (!confirm('确定删除该商品？')) return;
      try { await API.del('/api/admin/products/' + id); toast('已删除', 'ok'); load(); }
      catch (e) { toast(e.message, 'err'); }
    }

    init();
  </script>
</body>
</html>
